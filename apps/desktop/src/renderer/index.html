<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline';" />
    <title>Dawning Agent OS — V0</title>
    <style>
      :root {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color-scheme: light dark;
      }
      body {
        margin: 0;
        padding: 24px;
        background: #1a1a1a;
        color: #f5f5f5;
      }
      h1 {
        font-size: 16px;
        font-weight: 500;
        margin: 0 0 12px;
        opacity: 0.7;
      }
      pre {
        background: #0d0d0d;
        border: 1px solid #2a2a2a;
        border-radius: 6px;
        padding: 16px;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        font-size: 13px;
        line-height: 1.5;
        overflow-x: auto;
        margin: 0;
      }
      .ok { color: #4ade80; }
      .err { color: #f87171; }
    </style>
  </head>
  <body>
    <h1>dawning-agent-os · runtime status</h1>
    <pre id="status">loading…</pre>
    <script>
      // Per ADR-025 §5 this UI is a scaffold: it only proves to the human
      // eye that database.ready=true && schemaVersion>=1. Real UI lives
      // in the next ADR.
      const el = document.getElementById('status');
      const refresh = async () => {
        try {
          if (!window.agentos || !window.agentos.runtime) {
            throw new Error('preload bridge missing — run via `pnpm run dev`');
          }
          const status = await window.agentos.runtime.getStatus();
          const ready = status && status.database && status.database.ready === true;
          el.className = ready ? 'ok' : 'err';
          el.textContent = JSON.stringify(status, null, 2);
        } catch (err) {
          el.className = 'err';
          el.textContent = `error: ${err && err.message ? err.message : err}`;
        }
      };
      refresh();
      setInterval(refresh, 5000);
    </script>
  </body>
</html>
